<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito de Compras | MouseStore</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background-image:url("fondo.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
}

nav{
    background:rgba(0,0,0,0.92);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 50px;
    box-shadow:0 0 15px black;
}

nav h1{
    color:#00bfff;
    font-size:32px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:18px;
    margin-left:20px;
}

nav a:hover{
    color:#00bfff;
}

.contenedor{
    min-height:100vh;
    background:rgba(0,0,0,0.75);
    padding:60px 20px;
}

.carrito-box{
    max-width:1100px;
    margin:auto;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    border-radius:25px;
    padding:35px;
    box-shadow:0 0 25px black;
}

h2{
    text-align:center;
    color:#00bfff;
    font-size:42px;
    margin-bottom:30px;
}

.resumen{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.card{
    background:rgba(0,0,0,0.75);
    padding:20px 30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px black;
}

.card h3{
    color:#00bfff;
    margin-bottom:10px;
}

.producto{
    background:rgba(255,255,255,0.96);
    color:black;
    padding:20px;
    margin-bottom:18px;
    border-radius:18px;
    display:grid;
    grid-template-columns:130px 1fr auto;
    gap:20px;
    align-items:center;
    box-shadow:0 0 15px black;
}

.producto img{
    width:120px;
    height:120px;
    object-fit:contain;
    background:white;
    border-radius:15px;
}

.producto h3{
    color:#111;
    font-size:24px;
    margin-bottom:8px;
}

.producto p{
    margin:5px 0;
}

.color{
    font-weight:bold;
    color:#007bff;
}

.acciones{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.mas{
    background:#28a745;
}

.menos{
    background:#ff9800;
}

.eliminar{
    background:#dc3545;
}

.vaciar{
    background:#6c757d;
}

.comprar{
    background:#00bfff;
}

.volver{
    background:#28a745;
}

.total{
    text-align:right;
    font-size:32px;
    color:#00ff99;
    margin-top:25px;
    font-weight:bold;
}

.botones-finales{
    display:flex;
    justify-content:flex-end;
    gap:15px;
    flex-wrap:wrap;
    margin-top:25px;
}

.vacio{
    text-align:center;
    font-size:24px;
    color:white;
    padding:40px;
}

footer{
    background:rgba(0,0,0,0.95);
    text-align:center;
    padding:25px;
}

@media(max-width:768px){
    nav{
        flex-direction:column;
        gap:15px;
    }

    nav div{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:10px;
    }

    nav a{
        margin-left:0;
    }

    .producto{
        grid-template-columns:1fr;
        text-align:center;
    }

    .producto img{
        margin:auto;
    }

    .total{
        text-align:center;
    }

    .botones-finales{
        justify-content:center;
    }
}
</style>

</head>

<body>

<nav>
    <h1>🖱 MouseStore</h1>

    <div>
        <a href="index.html">Inicio</a>
        <a href="explorar.html">Tiendas</a>
        <a href="/mis-compras">Mis Compras</a>
        <a href="/admin-usuarios">Admin</a>
    </div>
</nav>

<div class="contenedor">

    <div class="carrito-box">

        <h2>🛒 Carrito de Compras</h2>

        <div class="resumen">

            <div class="card">
                <h3>Productos</h3>
                <p id="cantidadProductos">0</p>
            </div>

            <div class="card">
                <h3>Envío</h3>
                <p>Gratis</p>
            </div>

            <div class="card">
                <h3>Pago</h3>
                <p>Yape / Plin / Tarjeta</p>
            </div>

        </div>

        <div id="listaProductos"></div>

        <div class="total" id="total"></div>

        <div class="botones-finales">

            <button class="vaciar" onclick="vaciarCarrito()">
                Vaciar Carrito
            </button>

            <button class="comprar" onclick="finalizarCompra()">
                Finalizar Compra
            </button>

            <a href="index.html">
                <button class="volver">
                    Seguir Comprando
                </button>
            </a>

        </div>

    </div>

</div>

<footer>
    <p>© 2026 MouseStore - Todos los derechos reservados</p>
</footer>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function obtenerImagen(nombre){

    if(nombre.includes("RGB")){
        return "rgb.jpg";
    }

    if(nombre.includes("Inalámbrico") || nombre.includes("Inalambrico")){
        return "inalambrico.jpg";
    }

    if(nombre.includes("Pro X")){
        return "prox.jpg";
    }

    return "logo.png";
}

function mostrarCarrito(){

    let lista = document.getElementById("listaProductos");
    let total = 0;
    let cantidadTotal = 0;

    lista.innerHTML = "";

    if(carrito.length === 0){
        lista.innerHTML = `
            <div class="vacio">
                🛒 Tu carrito está vacío.<br><br>
                Agrega productos desde la tienda.
            </div>
        `;

        document.getElementById("total").innerHTML = "Total: S/ 0";
        document.getElementById("cantidadProductos").innerHTML = "0";
        return;
    }

    carrito.forEach((producto,index)=>{

        let subtotal = producto.precio * producto.cantidad;
        total += subtotal;
        cantidadTotal += producto.cantidad;

        let color = producto.color ? producto.color : "No aplica";
        let imagen = obtenerImagen(producto.nombre);

        lista.innerHTML += `
        <div class="producto">

            <img src="${imagen}" alt="${producto.nombre}">

            <div>
                <h3>${producto.nombre}</h3>
                <p class="color">Color: ${color}</p>
                <p>Precio: S/ ${producto.precio}</p>
                <p>Cantidad: ${producto.cantidad}</p>
                <p>Subtotal: S/ ${subtotal}</p>
            </div>

            <div class="acciones">

                <button class="mas" onclick="aumentar(${index})">
                    +
                </button>

                <button class="menos" onclick="disminuir(${index})">
                    -
                </button>

                <button class="eliminar" onclick="eliminar(${index})">
                    Eliminar
                </button>

            </div>

        </div>
        `;
    });

    document.getElementById("total").innerHTML = "Total: S/ " + total;
    document.getElementById("cantidadProductos").innerHTML = cantidadTotal;
}

function aumentar(index){
    carrito[index].cantidad++;
    guardar();
}

function disminuir(index){

    if(carrito[index].cantidad > 1){
        carrito[index].cantidad--;
    }

    guardar();
}

function eliminar(index){
    carrito.splice(index,1);
    guardar();
}

function vaciarCarrito(){
    localStorage.removeItem("carrito");
    carrito = [];
    mostrarCarrito();
}

function guardar(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrarCarrito();
}

function finalizarCompra(){

    if(carrito.length === 0){
        alert("Tu carrito está vacío.");
        return;
    }

    alert("Para finalizar una compra real, usa el botón Comprar Ahora del producto.");

    window.location.href = "index.html";
}

mostrarCarrito();

</script>

</body>
</html>
